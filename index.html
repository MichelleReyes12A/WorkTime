<!DOCTYPE html>
<html lang="es">

  
<head> <!-- ================================= HEAD ================================= -->
  <meta charset="UTF-8"> <!-- Caracteres de la pagina, acentos, ñ, simbolos -->
  <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Ajuste de vista, tamano -->
  <title>Horas de Miseria</title> <!-- Nombre de la pagina -->
  
  <style> /* ================================== STYLE ====================================== */
    @import url('https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Square+Peg&display=swap');

    body 
    {
      font-family: "Square Peg", cursive;
      font-weight: 400;
      font-style: normal;
      font-size: 1.5rem;
      padding: 3rem;
      background-color: #000000; /*<!-- Color hexadecimal NEGRO -->*/
      color: #FFFFFF;
      max-width: 1000px; /*<!-- Ancho maximo de la pantalla -->*/
      margin: auto;
    }
    
    h1 
    {
      text-align: center;
      font-family: "Bitcount Prop Single", system-ui;
      font-optical-sizing: auto;
      font-weight: 270;
      font-style: normal;
      font-size: 3rem;
    }
    
    table 
    {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    
    th, td /*<!-- Estilos de celdas --> */
    {
      border: 1px solid #ddd; 
      padding: 0.5rem;
      text-align: center;
    }
    
    input[type="time"] /*<!-- Estilo de entrada de datos de tiempo --> */
    {
      width: 90%;
      padding: 0.3rem;
    }
    
    .summary /*<!-- Estilo de la caja de salida -->*/ 
    { 
      margin-top: 2rem;
      padding: 1rem;
      background: #fff;
      color: #000000;
      border-radius: 8px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

        /* ===== Layout principal =-------------------------------------==== */
    main {
        flex-wrap: wrap; /* Permite que se acomode en pantallas pequeñas */ 
        display: grid;
        grid-template-columns: 15% 70% 15%; /* Proporciones: 2 - 3 - 1 */
        min-height: 50vh;
    }

    #hora {
        font-size: 1rem;
        margin: 5px 0;
    }
     #fecha{
        font-size: 1.5rem;
        font-weight: 500;
        margin: 10px 0;
        margin-top: 2rem;
        padding: 1rem;
        background: #fff;
        color: #000000;
        border-radius: 8px;
        box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }
    ul {
      font-size: 1rem;
      margin: 10px;
    }
    #cumples{
      margin-left:1rem;
      font-size: 1rem;
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
    }

    
    /* ================================== STYLE ====================================== */
  </style> 
  
</head> <!-- ================================= HEAD ================================= -->


  
<body> <!-- ================================== BODY ====================================== --> 


  <main id="contenido">

    
        <div class="columna izquierda"> 
              <div id="hoy"></div>
              <div id="fecha"></div>
              <div id="hora"></div>
          
              <script>
                  // Función para actualizar fecha y hora
                      function actualizarFechaHora() {
                      const ahora = new Date();
                     
              
                      // Opciones para formato de fecha
                      const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                      const fechaFormateada = ahora.toLocaleDateString('es-ES', opcionesFecha);
              
                      // Opciones para formato de hora
                      const opcionesHora = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
                      const horaFormateada = ahora.toLocaleTimeString('es-ES', opcionesHora);
              
                      // Mostrar en HTML
                      document.getElementById('fecha').textContent = fechaFormateada;
                      document.getElementById('hora').textContent = horaFormateada;
                  }

                  // Actualizar inmediatamente al cargar
                  actualizarFechaHora();
                  // Actualizar cada segundo
                  setInterval(actualizarFechaHora, 1000);
              </script> 

          <img src="QR.jpeg">

        </div>
        
        <div class="columna centro">

            <h1>Simulador de Horas de Explotación</h1>
          
            <table>
              <thead> <!-- Table Head, definimos el nombre de las filas --> 
                <tr> <!-- Table Row --> 
                  <th>---</th>
                  <th>Entrada</th>
                  <th>Salida</th>
                  <th>Comida</th>
                  <th>Horas trabajadas</th>
                  
                </tr>
              </thead>
              
              <tbody id="tabla">
                <!-- Las filas se generan con JS -->
              </tbody>
            </table>
          
            <div class="summary" id="resumen">
              Total de Horas: 0.00 hrs<br>
              Faltan: 40.00 hrs para llegar a 40
            </div>
          
            
            <script> 
              const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"]; /*<!-- Lista de dias -->*/ 
              const tabla = document.getElementById("tabla");
              const resumen = document.getElementById("resumen");
          
          
              
              function crearFila(dia, i) 
              {
                const tr = document.createElement("tr");
                const tdDia = document.createElement("td");
                tdDia.textContent = dia;
          
                const tdEntrada = document.createElement("td");
                const entrada = document.createElement("input");
                entrada.type = "time";
                entrada.id = `entrada-${i}`;
                entrada.value = "07:00"; // Valor por defecto
                entrada.oninput = calcularTodo; /*Llama a una funcion*/
                tdEntrada.appendChild(entrada);
          
          
                const tdSalida = document.createElement("td");
                const salida = document.createElement("input");
                salida.type = "time";
                salida.id = `salida-${i}`;
                salida.oninput = calcularTodo; /*Llama a una funcion*/
                tdSalida.appendChild(salida);
          
          
                const tdComida = document.createElement("td");
                const comida = document.createElement("input");
                comida.type = "number";
                comida.id = `comida-${i}`;
                comida.value = 0.50; // Valor inicial
                comida.step = "0.25"; // Permite decimales
                comida.min = "0";    // No permitir negativos
                comida.oninput = calcularTodo; // Para recalcular si cambia
                tdComida.appendChild(comida);
                
                
                const tdHoras = document.createElement("td");
                tdHoras.id = `horas-${i}`;
                tdHoras.textContent = "0.00";
          
                tr.appendChild(tdDia);
                tr.appendChild(tdEntrada);
                tr.appendChild(tdSalida);
                tr.appendChild(tdComida);
                tr.appendChild(tdHoras);
          
                tabla.appendChild(tr);
              }
          
          
              
              function calcularTodo() 
              {
                let total = 0;
          
                for (let i = 0; i < dias.length; i++) /*Recorren todos los dias*/
                {
                  const entrada = document.getElementById(`entrada-${i}`).value;
                  const salida = document.getElementById(`salida-${i}`).value;
                  const comida = document.getElementById(`comida-${i}`).value;
                  const tdHoras = document.getElementById(`horas-${i}`);
          
                  if (entrada && salida) {
                    const [eh, em] = entrada.split(":").map(Number);
                    const [sh, sm] = salida.split(":").map(Number);
          
                    let horas = (sh + sm / 60) - (eh + em / 60) - comida; // -1 por comida
          
                    horas = Math.max(0, horas);
                    tdHoras.textContent = horas.toFixed(2);
                    total += horas;
                  } else {
                    tdHoras.textContent = "0.00";
                  }
                }
          
                const faltan = Math.max(0, 40 - total);
                resumen.innerHTML = `
                  Total semanal: ${total.toFixed(2)} hrs<br>
                  ${faltan === 0 
                      ? `Listo, Huye! 🎉 <br><img src="https://media1.tenor.com/m/XpXWABMIkMoAAAAC/pato-baile.gif">`
                      : `Solo faltan 40 años y ${faltan.toFixed(2)} hrs para SALIR DE LA MISERIA!`}
                `;
               // if (faltan === 0 && confirm('Quieres donarme? (porfi :C)'))
                //{
                  //alert("Paypal: gatita_chili@hotmail.com");
                //}
              }
          
              // Inicializar tabla
              dias.forEach((dia, i) => crearFila(dia, i));    

              function actualizarDia() {
                const dia = new Date().getDay();
                const diasSemana = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const diaSemana = diasSemana[dia];

              const filas = document.querySelectorAll("#tabla tr");
              filas.forEach(fila => {
                if (fila.textContent.includes(diaSemana)) {
                  fila.style.backgroundColor = "pink";
                }else{fila.style.backgroundColor = "black";}
              });
              }


              actualizarDia();
              setInterval(actualizarDia, 21600000); //cada 6 horas
            </script>

          
        </div>

        <div class="columna derecha">
          <br>
            <ul>
              <br>Proximos cumpleaños: <br> 
              <li>Betty: 21-Jun</li>
              <li>Melannie: 23-Aug</li>
              <li>Cynthia: 4-Nov</li>
              <li>Mich: 26-Dec</li>
              <li>Cris: 6-Mar</li>
          </ul>

          <div id="cumples"></div>
          
        </div>

    </main>


    <footer>
      <p id="res"></p>
      
      <script>

        function actualizarPaga()
        {
          const hoy1 = new Date();
          const year = hoy1.getFullYear();
          const mes = hoy1.getMonth(); // 0 = enero, 11 = diciembre
          let fechaNum=15;
          let Q;
          
          if (hoy1.getDate() <= 15 )     
          {
              Q = new Date(year, mes, 15); //fecha completa del 15
          }else
          {
              Q = new Date(year, mes + 1, 0); //fecha completa del ult dia
              fechaNum = Q.getDate(); //1-31
          }
          
          const fechaSemana = Q.getDay(); //(0 = domingo, 6 = sábado)
          
          if (fechaSemana === 0) {fechaNum -= 2;}
          else if (fechaSemana === 6) {fechaNum--;}
          
          const paga = fechaNum - hoy1.getDate();
          
          document.getElementById("res").innerText =
              `Faltan ${paga} días para que paguen`;
          
          switch(mes)
            {
              case 2: //marzo
                document.getElementById("cumples").innerHTML = '<br> Feliz MES de cumpleaños Cris!<br> <img src="https://i.makeagif.com/media/9-30-2016/7T2-Rc.gif" style="max-width:200px;">';
                  break;  
                
              case 5: //junio
                document.getElementById("cumples").innerHTML = '<br> Feliz MES de cumpleaños Betty!<br><img src="cumple.gif" style="max-width:200px;"> <br> <img src="https://i.makeagif.com/media/9-30-2016/7T2-Rc.gif" style="max-width:200px;">';
                  break;
                
              case 7: //agosto
              document.getElementById("cumples").innerHTML = '<br> Feliz MES de cumpleaños Melannie!<br> <img src="https://i.makeagif.com/media/9-30-2016/7T2-Rc.gif" style="max-width:200px;">';
                break;
                
              case 10: //noviembre
                document.getElementById("cumples").innerHTML = '<br> Feliz MES de cumpleaños Cynthia!<br> <img src="https://i.makeagif.com/media/9-30-2016/7T2-Rc.gif" style="max-width:200px;">';
                  break; 
                
              case 11: //diciembre
                document.getElementById("cumples").innerHTML = '<br> Feliz MES de cumpleaños a mi!<br> <img src="https://i.makeagif.com/media/9-30-2016/7T2-Rc.gif" style="max-width:200px;">';
                  break;  
            }
          
        }
        
        actualizarPaga();
        setInterval(actualizarPaga, 21600000); //cada 6h

      </script>
        
    </footer>

</body> <!-- ================================== BODY ====================================== -->  


  
</html>
